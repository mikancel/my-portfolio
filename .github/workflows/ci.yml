name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # 本番の Turso には接続しない。db.ts はローカルSQLiteにフォールバックするので、
      # 空のスキーマだけ用意してビルド（静的生成）を通す。
      - name: Prepare empty local DB
        run: npm run db:migrate

      - name: Build
        run: npm run build
        env:
          # ビルド時にセッション初期化が走るためダミー値を渡す（本番の値ではない）
          SESSION_SECRET: ci-build-only-secret-0123456789abcdef
